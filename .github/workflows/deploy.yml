name: Deploy Portfolio (React + Vite) to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set deployment config
        id: deploy_config
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "BASE_PATH=/fs-portfolio/" >> $GITHUB_ENV
            echo "DEST_DIR=fs-portfolio" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/it-track" ]; then
            echo "BASE_PATH=/it-portfolio/" >> $GITHUB_ENV
            echo "DEST_DIR=it-portfolio" >> $GITHUB_ENV
          fi

      - name: Install Dependencies
        run: npm install

      - name: Build project
        env:
          VITE_BASE_PATH: ${{ env.BASE_PATH }}

        run: npm run build

      - name: Create SPA 404 page
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ env.DEST_DIR }}
          keep_files: true
